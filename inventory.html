<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#000;--g950:#0a0a0a;--g900:#111;--g800:#1a1a1a;
  --g700:#2a2a2a;--g600:#3a3a3a;--g400:#666;--g300:#888;
  --yellow:#f5e014;--yd:#c9b800;
  --red:#e53e3e;--amber:#e8922a;--green:#38a169;
  --sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
html{font-size:14px}
body{background:var(--black);color:#d4d4d4;font-family:var(--sans);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;background:var(--g950);border-bottom:1px solid var(--g700);display:flex;align-items:center;padding:0 16px;gap:0}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--g300);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:0;margin-right:12px;text-decoration:none;flex-shrink:0}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.back-btn:hover{color:#fff}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo-mark{width:28px;height:28px;background:var(--yellow);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.nav-company{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff}
.nav-divider{width:1px;height:20px;background:var(--g700);margin:0 14px}
.nav-product{font-size:12px;color:var(--g300);letter-spacing:.04em}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);background:var(--g800);border:1px solid var(--g700);border-radius:4px;padding:3px 8px;white-space:nowrap}

/* SYNC BTN */
.sync-btn{background:var(--yellow);color:var(--black);border:none;border-radius:6px;padding:6px 14px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.sync-btn:hover{opacity:.85}
.sync-btn:disabled{opacity:.4;cursor:default}
.sync-btn.syncing{background:var(--g700);color:var(--g300)}
.sync-btn.success{background:var(--green);color:#fff}
.sync-btn.error{background:var(--red);color:#fff}

/* PAGE */
.page{padding-top:52px;min-height:100vh}

/* TOOLBAR */
.toolbar{background:var(--g900);border-bottom:1px solid var(--g700);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:52px;z-index:100}
.search-wrap{flex:1;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--g400);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;background:var(--g800);border:1px solid var(--g700);border-radius:6px;padding:8px 10px 8px 32px;color:#fff;font-family:var(--sans);font-size:13px;outline:none}
.search-input::placeholder{color:var(--g400)}
.search-input:focus{border-color:var(--yd)}
.filter-btn{background:var(--g800);border:1px solid var(--g700);border-radius:6px;padding:8px 12px;color:var(--g300);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-btn.active{background:rgba(229,62,62,.15);border-color:var(--red);color:var(--red)}

/* STATS BAR */
.stats-bar{background:var(--g950);border-bottom:1px solid var(--g700);padding:10px 16px;display:flex;gap:20px}
.stat{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--g400)}
.stat-dot{width:6px;height:6px;border-radius:50%}
.stat-num{color:#fff;font-weight:500}

/* SECTIONS */
.section-hdr{background:var(--g950);padding:10px 16px;border-bottom:1px solid var(--g700);display:flex;align-items:center;justify-content:space-between;position:sticky;top:108px;z-index:90;cursor:pointer;user-select:none}
.section-hdr:hover .section-title{opacity:.8}
.section-chevron{font-size:10px;color:var(--g400);transition:transform .2s;flex-shrink:0;margin-left:8px}
.section-hdr.collapsed .section-chevron{transform:rotate(-90deg)}
.section-items.collapsed{display:none}
.section-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);font-weight:500}
.section-count{font-family:var(--mono);font-size:10px;color:var(--g400)}

/* ITEM ROWS */
.item-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);gap:12px;transition:background .1s}
.item-row:hover{background:rgba(255,255,255,.02)}
.item-row.low{border-left:3px solid var(--red)}
.item-row.ok{border-left:3px solid transparent}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-family:var(--mono);font-size:10px;color:var(--g400);margin-top:2px}
.item-par{color:var(--g300)}
.item-par.low{color:var(--red)}
.item-par.ok{color:var(--green)}

/* COUNT INPUT */
.count-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.count-btn{background:var(--g700);border:none;color:var(--g300);width:28px;height:28px;border-radius:6px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0}
.count-btn:hover,.count-btn:active{background:var(--g600);color:#fff}
.count-input{width:56px;background:var(--g800);border:1px solid var(--g700);border-radius:6px;padding:5px 6px;color:#fff;font-family:var(--mono);font-size:14px;font-weight:500;text-align:center;outline:none;appearance:textfield}
.count-input::-webkit-inner-spin-button,.count-input::-webkit-outer-spin-button{appearance:none}
.count-input:focus{border-color:var(--yd)}
.count-input.low{border-color:rgba(229,62,62,.4);color:var(--red)}
.count-input.ok{border-color:rgba(56,161,105,.4)}

/* EMPTY */
.empty{padding:48px 16px;text-align:center;color:var(--g400);font-family:var(--mono);font-size:12px}

/* AUTH MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.8);align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--g900);border:1px solid var(--g700);border-radius:12px;padding:28px 24px;width:100%;max-width:400px}
.modal-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--g400);margin-bottom:24px;line-height:1.5}
.modal-btn{width:100%;background:var(--yellow);color:var(--black);border:none;border-radius:8px;padding:12px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.modal-btn:hover{opacity:.85}
.modal-cancel{display:block;text-align:center;margin-top:12px;color:var(--g400);font-size:13px;cursor:pointer}
.modal-cancel:hover{color:#fff}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g800);border:1px solid var(--g700);border-radius:8px;padding:10px 20px;font-family:var(--mono);font-size:12px;color:#fff;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.green{border-color:var(--green);color:var(--green)}
.toast.red{border-color:var(--red);color:var(--red)}

/* FOOTER */
.page-footer{padding:20px 16px;border-top:1px solid var(--g700);display:flex;justify-content:space-between;align-items:center}
.footer-text{font-family:var(--mono);font-size:10px;color:var(--g600)}

@media(max-width:768px){
  html{font-size:16px}
  .nav-divider,.nav-product{display:none}
  .nav-logo{display:none}
  .stats-bar{gap:12px}
  .section-hdr{top:108px}
}
</style>
</head>

// State
const counts = {};
const collapsedSections = new Set();
let filterLow = false;
let tokenClient = null;
let accessToken = null;

// Init Google Identity Services
function loadGIS() {
  if (CLIENT_ID === '913629678796-thcapfaqb3sluu4sjgkgtc2fa5m2lvab.apps.googleusercontent.com') return;
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { showToast('Auth failed: ' + resp.error, 'red'); return; }
        accessToken = resp.access_token;
        pushToSheets();
      }
    });
  };
  document.head.appendChild(script);
}

function getCount(row) {
  return counts[row] !== undefined ? counts[row] : '';
}

function setCount(row, val) {
  const num = parseFloat(val);
  counts[row] = isNaN(num) ? '' : num;
  updateStats();
  updateRowStyle(row);
}

function stepCount(row, delta) {
  const cur = getCount(row);
  const num = (cur === '' ? 0 : parseFloat(cur)) + delta;
  const rounded = Math.round(num * 4) / 4; // quarter increments
  counts[row] = Math.max(0, rounded);
  const input = document.getElementById('c-' + row);
  if (input) input.value = counts[row];
  updateStats();
  updateRowStyle(row);
}

function updateRowStyle(row) {
  const item = ITEMS.find(i => i.row === row);
  if (!item) return;
  const input = document.getElementById('c-' + row);
  const rowEl = document.getElementById('r-' + row);
  if (!input || !rowEl) return;
  const val = getCount(row);
  const isLow = val !== '' && parseFloat(val) < item.par;
  input.className = 'count-input' + (isLow ? ' low' : val !== '' ? ' ok' : '');
  rowEl.className = 'item-row' + (isLow ? ' low' : ' ok');
}

function updateStats() {
  const counted = ITEMS.filter(i => getCount(i.row) !== '').length;
  const low = ITEMS.filter(i => {
    const v = getCount(i.row);
    return v !== '' && parseFloat(v) < i.par;
  }).length;
  document.getElementById('stat-total').textContent = ITEMS.length;
  document.getElementById('stat-counted').textContent = counted;
  document.getElementById('stat-low').textContent = low;
}

function toggleSection(secId) {
  if (collapsedSections.has(secId)) {
    collapsedSections.delete(secId);
  } else {
    collapsedSections.add(secId);
  }
  renderList();
}

function toggleFilter() {
  filterLow = !filterLow;
  document.getElementById('filter-low').classList.toggle('active', filterLow);
  renderList();
}

function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const list = document.getElementById('list');
  const sections = [...new Set(ITEMS.map(i => i.section))];
  let html = '';

  sections.forEach(section => {
    let items = ITEMS.filter(i => i.section === section);
    if (q) items = items.filter(i => i.item.toLowerCase().includes(q) || i.uom.toLowerCase().includes(q));
    if (filterLow) items = items.filter(i => {
      const v = getCount(i.row);
      return v !== '' && parseFloat(v) < i.par;
    });
    if (!items.length) return;

    const secId = section.replace(/\s+/g,'_');
    const isCollapsed = collapsedSections.has(secId);
    html += `<div class="section-hdr${isCollapsed?' collapsed':''}" onclick="toggleSection('${secId.replace(/'/g,"\\'")}')"><div style="display:flex;align-items:center;gap:8px"><span class="section-title">${section}</span><span class="section-count">${items.length} items</span></div><span class="section-chevron">▼</span></div>`;
    html += `<div class="section-items${isCollapsed?' collapsed':''}" id="sec-${secId}">`;
    items.forEach(i => {
      const val = getCount(i.row);
      const isLow = val !== '' && parseFloat(val) < i.par;
      const parTxt = i.par > 0 ? `par: ${i.par}` : '';
      html += `<div class="item-row${isLow ? ' low' : ' ok'}" id="r-${i.row}">
        <div class="item-info">
          <div class="item-name">${i.item}</div>
          <div class="item-meta"><span class="item-uom">${i.uom}</span>${parTxt ? ` &nbsp;·&nbsp; <span class="item-par${isLow ? ' low' : val !== '' ? ' ok' : ''}">${parTxt}</span>` : ''}</div>
        </div>
        <div class="count-wrap">
          <button class="count-btn" onclick="stepCount(${i.row},-0.25)">−</button>
          <input class="count-input${isLow ? ' low' : val !== '' ? ' ok' : ''}" id="c-${i.row}" type="number" min="0" step="0.25" value="${val}" placeholder="—" oninput="setCount(${i.row}, this.value)">
          <button class="count-btn" onclick="stepCount(${i.row},0.25)">+</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">No items match your search.</div>';
  list.innerHTML = html;
}

// ── SYNC ────────────────────────────────────────────
function startSync() {
  const counted = ITEMS.filter(i => getCount(i.row) !== '').length;
  if (!counted) { showToast('No counts to sync yet', 'red'); return; }
  if (CLIENT_ID === '913629678796-thcapfaqb3sluu4sjgkgtc2fa5m2lvab.apps.googleusercontent.com') { showToast('Client ID not configured', 'red'); return; }
  document.getElementById('auth-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('auth-modal').classList.remove('open');
}

function doAuth() {
  closeModal();
  if (!tokenClient) { showToast('Google auth not loaded', 'red'); return; }
  if (accessToken) { pushToSheets(); return; }
  tokenClient.requestAccessToken();
}

async function pushToSheets() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = 'Syncing...';
  btn.disabled = true;
  btn.className = 'sync-btn syncing';

  // Build batch update — only rows with counts entered
  const data = ITEMS
    .filter(i => getCount(i.row) !== '')
    .map(i => ({
      range: `${SHEET_TAB}!D${i.row}`,
      values: [[getCount(i.row)]]
    }));

  try {
    const resp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`,
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data })
      }
    );

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || resp.statusText);
    }

    btn.textContent = 'Synced ✓';
    btn.className = 'sync-btn success';
    showToast(`${data.length} counts synced to Google Sheets`, 'green');
    setTimeout(() => {
      btn.textContent = 'Sync to Sheet';
      btn.disabled = false;
      btn.className = 'sync-btn';
    }, 3000);

  } catch(e) {
    btn.textContent = 'Sync Failed';
    btn.className = 'sync-btn error';
    btn.disabled = false;
    showToast('Sync failed: ' + e.message, 'red');
    accessToken = null; // force re-auth next time
    setTimeout(() => {
      btn.textContent = 'Sync to Sheet';
      btn.className = 'sync-btn';
    }, 3000);
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();
  updateStats();
  renderList();
  loadGIS();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
