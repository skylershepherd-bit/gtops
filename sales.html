<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>GT Ops — Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--surface2:#f9fafb;--border:#e4e7ec;--border2:#d0d5dd;
  --text:#101828;--text2:#344054;--muted:#667085;--muted2:#98a2b3;
  --accent:#c9a800;--accent-dark:#a38600;--accent-light:#fffbe6;--accent-mid:#fde68a;--accent-text:#78350f;
  --green:#079455;--green-bg:#ecfdf3;--green-bd:#abefc6;
  --red:#d92d20;--red-bg:#fef3f2;--red-bd:#fecdca;
  --amber:#b54708;--amber-bg:#fffaeb;--amber-bd:#fedf89;
  --blue:#1d4ed8;--blue-bg:#eff3ff;--blue-bd:#c7d5fa;
  --sidebar-w:56px;--topnav-h:52px;
  --shadow-sm:0 1px 2px rgba(16,24,40,.06);--shadow:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --r:10px;--sans:'Bricolage Grotesque',system-ui,sans-serif;--mono:'Geist Mono',monospace;
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;display:flex}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;position:fixed;top:0;left:0;bottom:0;z-index:200;gap:2px}
.sidebar-logo{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;overflow:hidden}
.nav-btn{width:40px;height:40px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;position:relative;text-decoration:none}
.nav-btn:hover{background:var(--surface2);color:var(--text)}.nav-btn.active{background:var(--accent-light);color:var(--accent-dark)}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.nav-tooltip{position:absolute;left:calc(var(--sidebar-w) + 8px);background:#101828;color:#fff;font-size:11px;padding:4px 9px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;font-family:var(--mono);z-index:300}
.nav-btn:hover .nav-tooltip{opacity:1}
.main-wrap{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:var(--topnav-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{display:none}.topbar-logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.topbar-name{font-weight:700;font-size:15px;letter-spacing:-.01em}
.topbar-sep{color:var(--muted2);margin:0 4px}.topbar-page{color:var(--muted);font-size:14px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:8px}
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--mono);background:var(--accent-light);color:var(--accent-text);border:1px solid var(--accent-mid)}
.page-content{padding:24px 24px 64px;max-width:1100px;width:100%;margin:0 auto}
.page-header{margin-bottom:22px}.page-header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
.page-header p{color:var(--muted);font-size:12px;margin-top:3px;font-family:var(--mono)}
.sl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;font-family:var(--mono);display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border)}
.kpi.up::before{background:var(--green)}.kpi.down::before{background:var(--red)}.kpi.ok::before{background:var(--green)}.kpi.accent::before{background:var(--accent)}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;font-family:var(--mono)}
.kpi-val{font-size:24px;font-weight:700;letter-spacing:-.03em;line-height:1}
.kpi-sub{margin-top:6px;font-size:11px;color:var(--muted)}.kpi-sub.up{color:var(--green)}.kpi-sub.down{color:var(--red)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);margin-bottom:16px}
.panel-hd{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.ph-title{font-size:13px;font-weight:600}.ph-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}
.panel-bd{padding:18px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;font-family:var(--mono);white-space:nowrap}
.badge.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.badge.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
.badge.yellow{background:var(--accent-light);color:var(--accent-text);border:1px solid var(--accent-mid)}
.gt-table{width:100%;border-collapse:collapse}
.gt-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);font-family:var(--mono);white-space:nowrap}
.gt-table th.r{text-align:right}
.gt-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.gt-table tr:last-child td{border-bottom:none}.gt-table tr:hover td{background:var(--surface2)}
.td-r{text-align:right;font-family:var(--mono);font-size:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:var(--accent-dark)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{background:var(--surface2)}
.var-up{color:var(--green);font-family:var(--mono);font-size:12px}.var-down{color:var(--red);font-family:var(--mono);font-size:12px}
.loading{padding:60px 20px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px}
.error-card{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;padding:16px 18px;margin-bottom:16px;font-family:var(--mono);font-size:12px;color:var(--red)}
.page-footer{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid var(--border);margin-top:8px}
.footer-text{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.mobile-nav{display:none}
@media(max-width:768px){
  html{font-size:16px}body{display:block}.sidebar{display:none}.main-wrap{margin-left:0}
  .topbar-logo{display:flex;align-items:center;gap:8px;margin-right:4px}
  .topbar-sep,.topbar-page{display:none}
  .page-content{padding:16px 14px 80px}
  .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);height:56px;box-shadow:0 -1px 3px rgba(16,24,40,.08)}
  .mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:9px;font-family:var(--mono);font-weight:600;letter-spacing:.04em;text-transform:uppercase;text-decoration:none}
  .mobile-nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
  .mobile-nav-btn.active{color:var(--accent-dark)}
}

.range-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.range-bar::-webkit-scrollbar{display:none}
.range-tab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:14px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.range-tab:hover{color:var(--text)}.range-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
.refresh-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.refresh-btn:hover{background:var(--surface2)}
.refresh-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.chart-legend{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<nav class="sidebar"><div class="sidebar-logo"><svg viewBox="0 0 28 28" width="28" height="28"><text x="14" y="20" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="15" fill="#000">GT</text></svg></div><a class="nav-btn " href="index.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="nav-tooltip">Home</span></a><a class="nav-btn " href="labor.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span class="nav-tooltip">Labor Scheduler</span></a><a class="nav-btn active" href="sales.html"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span class="nav-tooltip">Sales Dashboard</span></a><a class="nav-btn " href="inventory.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="nav-tooltip">Inventory Count</span></a><a class="nav-btn " href="tasks.html"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span class="nav-tooltip">Task Report</span></a><a class="nav-btn " href="coverage.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg><span class="nav-tooltip">Table Coverage</span></a></nav>
<div class="main-wrap">
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo"><div class="topbar-logo-mark"><svg viewBox="0 0 28 28" width="20" height="20"><text x="14" y="20" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="15" fill="#000">GT</text></svg></div></div>
    <span class="topbar-name">Game Theory</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-page">Sales Dashboard</span>
  </div>
  <div class="topbar-right"><span class="chip" id="nav-updated">—</span><button class="refresh-btn" id="refresh-btn" onclick="loadData()"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button></div>
</header>
  <div class="range-bar">
    <div class="range-tab active" onclick="setRange('week')" id="tab-week">This Week</div>
    <div class="range-tab" onclick="setRange('month')" id="tab-month">This Month</div>
    <div class="range-tab" onclick="setRange('3month')" id="tab-3month">3 Months</div>
    <div class="range-tab" onclick="setRange('6month')" id="tab-6month">6 Months</div>
  </div>
  <div class="page-content">
    <div id="content"><div class="loading">Loading data from 7shifts...</div></div>
  </div>
</div>
<nav class="mobile-nav"><a class="mobile-nav-btn " href="index.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home</a><a class="mobile-nav-btn " href="labor.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Labor</a><a class="mobile-nav-btn active" href="sales.html"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Sales</a><a class="mobile-nav-btn " href="inventory.html"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Inventory</a><a class="mobile-nav-btn " href="coverage.html"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>Coverage</a></nav>
<script>
const PROXY='/.netlify/functions/shifts';
let companyId=null,currentRange='week',salesChart=null,varChart=null;
function fmt$(n){return'$'+Math.round(n).toLocaleString();}
function fmtPct(n){return n.toFixed(1)+'%';}
function fmtVar(n){const s=(n>=0?'+':'')+fmt$(n);return`<span style="color:${n>=0?'var(--green)':'var(--red)'};font-family:var(--mono);font-size:12px">${s}</span>`;}
function dateRange(range){const now=new Date();const to=now.toISOString().split('T')[0];let from;if(range==='week'){const d=new Date(now);d.setDate(d.getDate()-6);from=d.toISOString().split('T')[0];}else if(range==='month'){from=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];}else if(range==='3month'){const d=new Date(now);d.setMonth(d.getMonth()-3);from=d.toISOString().split('T')[0];}else{const d=new Date(now);d.setMonth(d.getMonth()-6);from=d.toISOString().split('T')[0];}return{from,to};}
function setRange(r){currentRange=r;['week','month','3month','6month'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===r));loadData();}
async function apiFetch(path){const res=await fetch(PROXY+'?path='+encodeURIComponent(path));if(!res.ok)throw new Error(`${res.status} ${res.statusText}`);return res.json();}
async function getCompany(){if(companyId)return;const me=await apiFetch('/whoami');companyId=me.data?.company_id;}
async function loadData(){const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');document.getElementById('content').innerHTML='<div class="loading">Loading data from 7shifts...</div>';
try{await getCompany();const{from,to}=dateRange(currentRange);const report=await apiFetch(`/reports/daily_sales_and_labor?company_id=${companyId}&start_date=${from}&end_date=${to}&location_id=0`);renderDashboard(report.data||report);document.getElementById('nav-updated').textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}catch(e){document.getElementById('content').innerHTML=`<div class="error-card">Failed to load data from 7shifts: ${e.message}<br><br>Check that your API token is correct and has access to reporting endpoints.</div>`;}btn.classList.remove('spinning');}
function renderDashboard(data){
  if(!data||!data.length){document.getElementById('content').innerHTML='<div class="loading">No data available for this period.</div>';return;}
  const rows=data.filter(r=>r.date||r.day);
  let totalActual=0,totalProjected=0,totalLabor=0,totalScheduled=0,totalHours=0;
  rows.forEach(r=>{totalActual+=parseFloat(r.total_sales||r.actual_sales||0);totalProjected+=parseFloat(r.projected_sales||0);totalLabor+=parseFloat(r.actual_labor_cost||r.actual_labor||0);totalScheduled+=parseFloat(r.scheduled_labor_cost||r.scheduled_labor||0);totalHours+=parseFloat(r.actual_hours||r.labor_hours||0);});
  const salesVar=totalActual-totalProjected,laborPct=totalActual>0?(totalLabor/totalActual)*100:0,avgSplh=totalHours>0?totalActual/totalHours:0,laborVar=totalLabor-totalScheduled;
  const statsHTML=`<div class="kpi-grid">
    <div class="kpi ${salesVar>=0?'up':'down'}"><div class="kpi-lbl">Actual Sales</div><div class="kpi-val">${fmt$(totalActual)}</div><div class="kpi-sub ${salesVar>=0?'up':'down'}">${salesVar>=0?'+':''}${fmt$(salesVar)} vs projected</div></div>
    <div class="kpi"><div class="kpi-lbl">Projected Sales</div><div class="kpi-val">${fmt$(totalProjected)}</div><div class="kpi-sub">Forecast period</div></div>
    <div class="kpi ${laborPct<=25?'ok':laborPct<=32?'accent':'down'}"><div class="kpi-lbl">Labor %</div><div class="kpi-val">${fmtPct(laborPct)}</div><div class="kpi-sub ${laborVar<=0?'up':'down'}">${laborVar<=0?'':'+'}<span style="font-family:var(--mono)">${fmt$(laborVar)}</span> vs scheduled</div></div>
    <div class="kpi ok"><div class="kpi-lbl">Avg SPLH</div><div class="kpi-val">$${Math.round(avgSplh)}</div><div class="kpi-sub">Sales per labor hour</div></div>
  </div>`;
  const labels=rows.map(r=>{const d=new Date(r.date||r.day);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});});
  const actuals=rows.map(r=>parseFloat(r.total_sales||r.actual_sales||0));
  const projected=rows.map(r=>parseFloat(r.projected_sales||0));
  const variances=rows.map(r=>parseFloat(r.total_sales||r.actual_sales||0)-parseFloat(r.projected_sales||0));
  let tableRows='';
  rows.forEach(r=>{const actual=parseFloat(r.total_sales||r.actual_sales||0),proj=parseFloat(r.projected_sales||0),variance=actual-proj,labor=parseFloat(r.actual_labor_cost||r.actual_labor||0),lPct=actual>0?(labor/actual*100).toFixed(1):'—',splh=parseFloat(r.actual_hours||r.labor_hours||0),splhVal=splh>0?'$'+Math.round(actual/splh):'—';const d=new Date(r.date||r.day);tableRows+=`<tr><td style="font-weight:700;color:var(--text)">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</td><td class="td-r">${fmt$(actual)}</td><td class="td-r">${fmt$(proj)}</td><td class="td-r">${fmtVar(variance)}</td><td class="td-r">${fmt$(labor)}</td><td class="td-r">${lPct}%</td><td class="td-r">${splhVal}</td></tr>`;});
  tableRows+=`<tr style="background:var(--surface2)"><td style="font-weight:700;color:var(--accent-dark)">Total</td><td class="td-r">${fmt$(totalActual)}</td><td class="td-r">${fmt$(totalProjected)}</td><td class="td-r">${fmtVar(salesVar)}</td><td class="td-r">${fmt$(totalLabor)}</td><td class="td-r">${fmtPct(laborPct)}</td><td class="td-r">$${Math.round(avgSplh)}</td></tr>`;
  document.getElementById('content').innerHTML=`${statsHTML}
    <div class="sl">Sales vs Projected</div>
    <div class="chart-card"><div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Actual</div><div class="legend-item"><div class="legend-dot" style="background:var(--border2)"></div>Projected</div></div><div style="position:relative;height:220px"><canvas id="sales-chart"></canvas></div></div>
    <div class="sl">Variance by Day</div>
    <div class="chart-card"><div style="position:relative;height:160px"><canvas id="var-chart"></canvas></div></div>
    <div class="sl">Daily Breakdown</div>

    <div class="page-footer"><span class="footer-text" id="footer-ts"></span><span class="footer-text">Game Theory · Sales Dashboard</span></div>`;
  document.getElementById('footer-ts').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();
  if(salesChart){salesChart.destroy();salesChart=null;}
  salesChart=new Chart(document.getElementById('sales-chart'),{type:'bar',data:{labels,datasets:[{label:'Actual',data:actuals,backgroundColor:'rgba(201,168,0,.7)',borderColor:'#c9a800',borderWidth:1},{label:'Projected',data:projected,backgroundColor:'rgba(208,213,221,.5)',borderColor:'#d0d5dd',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#e4e7ec',borderWidth:1,titleColor:'#667085',bodyColor:'#101828',titleFont:{family:'Geist Mono',size:10},bodyFont:{family:'Geist Mono',size:11},padding:10,callbacks:{label:ctx=>` ${ctx.dataset.label}: $${Math.round(ctx.parsed.y).toLocaleString()}`}}},scales:{y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',color:'#667085',font:{family:'Geist Mono',size:10}},grid:{color:'#f4f5f7'},border:{display:false}},x:{ticks:{color:'#667085',font:{family:'Geist Mono',size:10},maxRotation:45},grid:{display:false},border:{display:false}}}}});
  if(varChart){varChart.destroy();varChart=null;}
  varChart=new Chart(document.getElementById('var-chart'),{type:'bar',data:{labels,datasets:[{label:'Variance',data:variances,backgroundColor:variances.map(v=>v>=0?'rgba(7,148,85,.6)':'rgba(217,45,32,.6)'),borderColor:variances.map(v=>v>=0?'#079455':'#d92d20'),borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#e4e7ec',borderWidth:1,titleColor:'#667085',bodyColor:'#101828',titleFont:{family:'Geist Mono',size:10},bodyFont:{family:'Geist Mono',size:11},padding:10,callbacks:{label:ctx=>` ${ctx.parsed.y>=0?'+':''}$${Math.round(ctx.parsed.y).toLocaleString()}`}}},scales:{y:{ticks:{callback:v=>(v>=0?'+':'')+Math.round(v/1000)+'k',color:'#667085',font:{family:'Geist Mono',size:10}},grid:{color:'#f4f5f7'},border:{display:false}},x:{ticks:{color:'#667085',font:{family:'Geist Mono',size:10},maxRotation:45},grid:{display:false},border:{display:false}}}}});
